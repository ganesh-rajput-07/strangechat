<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strange Chat</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-message-stranger: #e8e8e8;
            --bg-message-you: #000000;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-message-you: #ffffff;
            --border-color: #e0e0e0;
            --accent-color: #000000;
            --accent-hover: #333333;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-message-stranger: #2a2a2a;
            --bg-message-you: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --text-message-you: #000000;
            --border-color: #333333;
            --accent-color: #ffffff;
            --accent-hover: #e0e0e0;
            --shadow: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .header {
            background: var(--bg-primary);
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-text {
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            color: var(--bg-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            color: var(--text-primary);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .status {
            text-align: center;
            padding: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: background 0.3s ease;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .message {
            padding: 0.875rem 1.25rem;
            border-radius: 16px;
            max-width: 70%;
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 400;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.stranger {
            background: var(--bg-message-stranger);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.you {
            background: var(--bg-message-you);
            color: var(--text-message-you);
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .message.system {
            background: transparent;
            color: var(--text-secondary);
            text-align: center;
            font-style: italic;
            font-size: 0.875rem;
            align-self: center;
            max-width: 100%;
        }

        .message.error {
            background: #ff4444;
            color: white;
            align-self: center;
            max-width: 100%;
        }

        .input-area {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s ease, background 0.3s ease;
        }

        #messageInput:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        #messageInput::placeholder {
            color: var(--text-secondary);
        }

        button {
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #sendBtn {
            background: var(--accent-color);
            color: var(--bg-primary);
        }

        #sendBtn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        #sendBtn:active {
            transform: translateY(0);
        }

        #sendBtn svg {
            width: 20px;
            height: 20px;
        }

        #nextBtn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        #nextBtn:hover {
            background: var(--border-color);
            transform: translateY(-1px);
        }

        #nextBtn:active {
            transform: translateY(0);
        }

        #nextBtn svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 1024px) {
            .chat-container {
                padding: 1.25rem;
            }

            .message {
                max-width: 75%;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 1rem 1.5rem;
            }

            .header h1 {
                font-size: 1.375rem;
            }

            .logo-text {
                width: 36px;
                height: 36px;
                font-size: 1.125rem;
            }

            .chat-container {
                padding: 1rem;
            }

            .message {
                max-width: 80%;
                font-size: 0.9rem;
            }

            .input-area {
                flex-wrap: wrap;
            }

            #messageInput {
                flex: 1;
                min-width: 0;
            }

            button {
                padding: 0.875rem 1.25rem;
                font-size: 0.9rem;
            }

            #sendBtn svg,
            #nextBtn svg {
                width: 18px;
                height: 18px;
            }
        }

        @media (max-width: 640px) {
            .header {
                padding: 0.875rem 1rem;
            }

            .header h1 {
                font-size: 1.25rem;
            }

            .logo-text {
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }

            .theme-toggle {
                width: 40px;
                height: 40px;
            }

            .theme-toggle svg {
                width: 20px;
                height: 20px;
            }

            .chat-container {
                padding: 0.75rem;
            }

            .status {
                font-size: 0.8rem;
                padding: 0.625rem;
            }

            .messages {
                padding: 1rem;
                border-radius: 12px;
            }

            .message {
                max-width: 85%;
                padding: 0.75rem 1rem;
                font-size: 0.875rem;
            }

            #messageInput {
                padding: 0.875rem 1rem;
                font-size: 0.9rem;
            }

            button {
                padding: 0.75rem 1rem;
                font-size: 0.875rem;
            }

            #sendBtn svg,
            #nextBtn svg {
                width: 16px;
                height: 16px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 0.75rem 0.875rem;
            }

            .header h1 {
                font-size: 1.125rem;
            }

            .logo-text {
                width: 32px;
                height: 32px;
                font-size: 0.875rem;
            }

            .theme-toggle {
                width: 36px;
                height: 36px;
            }

            .chat-container {
                padding: 0.625rem;
            }

            .messages {
                padding: 0.75rem;
                border-radius: 10px;
            }

            .message {
                max-width: 90%;
                padding: 0.625rem 0.875rem;
                font-size: 0.875rem;
            }

            .input-area {
                gap: 0.5rem;
            }

            #messageInput {
                padding: 0.75rem 0.875rem;
                font-size: 0.875rem;
            }

            button {
                padding: 0.625rem 0.875rem;
                font-size: 0.8125rem;
                gap: 0.375rem;
            }

            #sendBtn svg,
            #nextBtn svg {
                width: 14px;
                height: 14px;
            }
        }

        @media (max-width: 360px) {
            .header h1 {
                font-size: 1rem;
            }

            .logo-text {
                width: 28px;
                height: 28px;
                font-size: 0.75rem;
            }

            .message {
                max-width: 95%;
                font-size: 0.8125rem;
            }

            button span {
                display: none;
            }

            button {
                padding: 0.75rem;
            }

            #sendBtn svg,
            #nextBtn svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo-text">SC</div>
            <h1>Strange Chat</h1>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg id="themeIcon">
                <use href="#icon-sun"></use>
            </svg>
        </button>
    </div>
    
    <div class="chat-container">
        <div class="status" id="status">Connecting...</div>
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">
                <svg><use href="#icon-send"></use></svg>
                Send
            </button>
            <button id="nextBtn">
                <svg><use href="#icon-next"></use></svg>
                Next
            </button>
        </div>
    </div>

    <!-- Load SVG icons -->
    <script>
        fetch('/static/icons.svg')
            .then(response => response.text())
            .then(svg => {
                document.body.insertAdjacentHTML('afterbegin', svg);
            });
    </script>

    <!-- Load sound effects -->
    <script src="/static/sounds.js"></script>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        let isDark = false;

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            isDark = true;
            updateThemeIcon();
        }

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        });

        function updateThemeIcon() {
            themeIcon.innerHTML = isDark 
                ? '<use href="#icon-moon"></use>' 
                : '<use href="#icon-sun"></use>';
        }

        // WebSocket Connection
        const ws = new WebSocket('ws://localhost:8000/ws');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const nextBtn = document.getElementById('nextBtn');
        const statusDiv = document.getElementById('status');

        function addMessage(text, type = 'stranger') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        ws.onopen = () => {
            statusDiv.textContent = 'Waiting for a stranger...';
            statusDiv.style.color = 'var(--text-primary)';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'message') {
                addMessage(data.text, 'stranger');
                // Play notification sound for received message
                if (window.playNotificationSound) {
                    window.playNotificationSound();
                }
                // Update status to show connected
                statusDiv.textContent = 'Connected with stranger';
            } else if (data.type === 'system') {
                // Update status based on system message
                if (data.message === 'Stranger connected') {
                    statusDiv.textContent = 'Connected with stranger';
                } else if (data.message === 'Stranger disconnected' || data.message === 'Stranger left') {
                    statusDiv.textContent = 'Waiting for a stranger...';
                    addMessage(data.message, 'system');
                } else if (data.message === 'Waiting for a stranger...') {
                    statusDiv.textContent = 'Waiting for a stranger...';
                } else {
                    // Only show other system messages in chat (not connection status)
                    addMessage(data.message, 'system');
                }
            } else if (data.type === 'error') {
                addMessage(data.message, 'error');
            }
        };

        ws.onclose = () => {
            statusDiv.textContent = 'Disconnected';
            statusDiv.style.color = '#ff4444';
            addMessage('Connection lost', 'system');
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            statusDiv.textContent = 'Error';
            statusDiv.style.color = '#ff4444';
        };

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text) {
                ws.send(JSON.stringify({
                    type: 'message',
                    text: text
                }));
                addMessage(text, 'you');
                // Play send sound
                if (window.playSendSound) {
                    window.playSendSound();
                }
                messageInput.value = '';
                messageInput.focus();
            }
        }

        function nextPartner() {
            // Clear messages
            messagesDiv.innerHTML = '';
            addMessage('Finding a new stranger...', 'system');
            
            ws.send(JSON.stringify({
                type: 'next'
            }));
        }

        sendBtn.addEventListener('click', sendMessage);
        nextBtn.addEventListener('click', nextPartner);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
